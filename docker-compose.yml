version: '3.8'

services:
  app:
    build: .
    container_name: grok-ds-app
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: grok-ds-jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
    restart: unless-stopped
